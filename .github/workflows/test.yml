name: Test Script

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y playerctl libnotify-bin

      - name: Check script syntax
        run: bash -n spotify-adblock.sh

      - name: Check install script syntax
        run: bash -n install.sh

      - name: Test install script (dry run)
        run: |
          chmod +x install.sh
          bash -x install.sh || true
