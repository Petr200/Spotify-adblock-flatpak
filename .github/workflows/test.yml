name: Ultra Strict Multi-Distro Test

on:
  push:
  pull_request:

jobs:

# =========================
# 🟢 Ubuntu test
# =========================
  ubuntu-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt update && sudo apt install -y playerctl libnotify-bin shellcheck

      - name: Syntax check
        run: |
          bash -n spotify-adblock.sh
          bash -n install.sh

      - name: Shellcheck
        run: |
          shellcheck spotify-adblock.sh
          shellcheck install.sh

      - name: Test download (404 protection)
        run: |
          curl -f -sSL https://raw.githubusercontent.com/Petr200/Spotify-adblock-flatpak/main/spotify-adblock.sh -o test.sh
          test -s test.sh

      - name: Fake Spotify simulation
        run: |
          mkdir fakebin
          echo '#!/bin/bash' > fakebin/playerctl
          echo 'echo "spotify/ad/test"' >> fakebin/playerctl
          chmod +x fakebin/playerctl

          export PATH="$PWD/fakebin:$PATH"
          timeout 2 bash spotify-adblock.sh || true

      - name: Install script test
        run: |
          export HOME=/tmp/test-home
          mkdir -p $HOME
          bash install.sh

      - name: Verify install
        run: |
          test -f /tmp/test-home/.local/bin/spotify-adblock.sh

# =========================
# 🔵 Fedora test (container)
# =========================
  fedora-test:
    runs-on: ubuntu-latest

    container:
      image: fedora:latest

    steps:
      - name: Install tools
        run: dnf install -y git bash curl playerctl libnotify

      - uses: actions/checkout@v4

      - name: Syntax check
        run: bash -n spotify-adblock.sh

      - name: Test script run
        run: timeout 2 bash spotify-adblock.sh || true

      - name: Test install script
        run: |
          export HOME=/tmp/test-home
          mkdir -p $HOME
          bash install.sh

# =========================
# 🟣 Arch test (container)
# =========================
  arch-test:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - name: Setup Arch
        run: |
          pacman -Sy --noconfirm
          pacman -S --noconfirm git bash curl playerctl libnotify

      - uses: actions/checkout@v4

      - name: Syntax check
        run: bash -n spotify-adblock.sh

      - name: Test script run
        run: timeout 2 bash spotify-adblock.sh || true
 # =========================
 # 🧠 Unit tests (logic)
 # =========================
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Test ad detection logic
        run: |
          set -euo pipefail

          detect_ad() {
              if [[ "$1" == *"spotify/ad"* ]]; then
                  return 0
              else
                  return 1
              fi
          }

          if ! detect_ad "spotify/ad/123"; then
              echo "ERROR: Ad detection failed"
              exit 1
          fi

          if detect_ad "spotify:track:xyz"; then
              echo "ERROR: False positive ad detection"
              exit 1
          fi

          echo "Unit tests passed"

      - name: Test loop protection logic
        run: |
          LAST="abc"
          CURRENT="abc"

          if [ "$CURRENT" = "$LAST" ]; then
            echo "Loop prevented OK ✅"
          else
            exit 1
          fi
