name: Strict Multi-Distro Test

on:
  push:
  pull_request:

jobs:

# =========================
# 🟢 Ubuntu test
# =========================
  ubuntu-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt update && sudo apt install -y playerctl libnotify-bin shellcheck

      - name: Run install script
        run: |
          export HOME=/tmp/test-home
          mkdir -p $HOME
          bash install.sh

      - name: Verify & Test Installed Script
        run: |
          export HOME=/tmp/test-home
          TARGET="$HOME/.local/bin/spotify-adblock.sh"
          
          echo "1. Checking if file exists..."
          test -f "$TARGET"
          
          echo "2. Syntax check..."
          bash -n "$TARGET"
          
          echo "3. Shellcheck..."
          shellcheck "$TARGET"
          shellcheck install.sh
          
          echo "4. Fake Spotify simulation..."
          mkdir -p fakebin
          echo '#!/bin/bash' > fakebin/playerctl
          echo 'echo "spotify/ad/test"' >> fakebin/playerctl
          chmod +x fakebin/playerctl

          export PATH="$PWD/fakebin:$PATH"
          timeout 2 bash "$TARGET" || true
          
          echo "Ubuntu tests passed ✅"

# =========================
# 🔵 Fedora test (container)
# =========================
  fedora-test:
    runs-on: ubuntu-latest

    container:
      image: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: dnf install -y git bash curl playerctl libnotify sudo

      - name: Run install script
        run: |
          export HOME=/tmp/test-home
          mkdir -p $HOME
          bash install.sh

      - name: Verify & Test Installed Script
        run: |
          export HOME=/tmp/test-home
          TARGET="$HOME/.local/bin/spotify-adblock.sh"
          
          echo "1. Checking if file exists..."
          test -f "$TARGET"
          
          echo "2. Syntax check..."
          bash -n "$TARGET"
          
          echo "3. Fake Spotify simulation..."
          mkdir -p fakebin
          echo '#!/bin/bash' > fakebin/playerctl
          echo 'echo "spotify/ad/test"' >> fakebin/playerctl
          chmod +x fakebin/playerctl

          export PATH="$PWD/fakebin:$PATH"
          timeout 2 bash "$TARGET" || true
          
          echo "Fedora tests passed ✅"

# =========================
# 🟣 Arch test (container)
# =========================
  arch-test:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Arch
        run: |
          pacman -Sy --noconfirm
          pacman -S --noconfirm git bash curl playerctl libnotify sudo

      - name: Run install script
        run: |
          export HOME=/tmp/test-home
          mkdir -p $HOME
          bash install.sh

      - name: Verify & Test Installed Script
        run: |
          export HOME=/tmp/test-home
          TARGET="$HOME/.local/bin/spotify-adblock.sh"
          
          echo "1. Checking if file exists..."
          test -f "$TARGET"
          
          echo "2. Syntax check..."
          bash -n "$TARGET"
          
          echo "3. Fake Spotify simulation..."
          mkdir -p fakebin
          echo '#!/bin/bash' > fakebin/playerctl
          echo 'echo "spotify/ad/test"' >> fakebin/playerctl
          chmod +x fakebin/playerctl

          export PATH="$PWD/fakebin:$PATH"
          timeout 2 bash "$TARGET" || true
          
          echo "Arch Linux tests passed ✅"

# =========================
# 🧠 Unit tests (logic)
# =========================
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Test ad detection logic
        run: |
          set -euo pipefail

          detect_ad() {
              if [[ "$1" == *"spotify/ad"* ]]; then
                  return 0
              else
                  return 1
              fi
          }

          if ! detect_ad "spotify/ad/123"; then
              echo "ERROR: Ad detection failed"
              exit 1
          fi

          if detect_ad "spotify:track:xyz"; then
              echo "ERROR: False positive ad detection"
              exit 1
          fi

          echo "Unit tests passed"

      - name: Test loop protection logic
        run: |
          LAST="abc"
          CURRENT="abc"

          if [ "$CURRENT" = "$LAST" ]; then
            echo "Loop prevented OK ✅"
          else
            exit 1
          fi
